apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: NodePort
  selector:
    project: ashok
    component: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: backend
  labels:
    project: ashok
    component: backend
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80